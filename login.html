<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NearXpirY | Login</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    @keyframes slideInLeft {
      from { transform: translateX(-100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    body {
      animation: fadeIn 0.8s ease-in;
    }
    .left-panel {
      animation: slideInLeft 0.8s ease-out 0.2s both;
    }
    .right-panel {
      animation: slideInRight 0.8s ease-out 0.4s both;
    }
    .welcome {
      animation: slideInDown 0.6s ease-out 0.6s both;
    }
    .subhead {
      animation: slideInDown 0.6s ease-out 0.8s both;
    }
    .field {
      animation: slideInUp 0.5s ease-out calc(1s + var(--field-delay, 0s)) both;
    }
    .field:nth-child(1) { --field-delay: 0.1s; }
    .field:nth-child(2) { --field-delay: 0.2s; }
    .btn-login {
      animation: slideInUp 0.6s ease-out 1.4s both;
      transition: all 0.3s ease;
    }
    .btn-login:hover {
      transform: translateY(-2px);
    }
    .forgot-link, .signup-hint {
      animation: fadeIn 0.6s ease-out 1.6s both;
    }
  </style>
</head>
<body class="login-bg">
  <div class="login-wrap">
    <!-- Left: Logo and tagline -->
    <section class="left-panel">
      <div class="brand-block">
        <img src="nearexpirylogo.png" alt="NearXpirY logo" class="brand-logo" />
        <h1 class="brand-name">NearXpirY</h1>
        <p class="brand-tagline">Save More, Waste Less</p>
      </div>
    </section>

    <!-- Right: Login form -->
    <section class="right-panel">
      <div class="form-block">
           <h2 class="welcome">WELCOME BACK!</h2>
           <h3 class="subhead">-------User Login--------</h3>

        <form id="loginForm" class="login-form" autocomplete="off">
          <!-- Username -->
          <label class="field">
            <span class="icon">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="#222">
                <path d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5zm0 2c-4.418 0-8 2.239-8 5v1h16v-1c0-2.761-3.582-5-8-5z"/>
              </svg>
            </span>
            <input type="text" name="username" placeholder="username" required />
          </label>

          <!-- Password -->
          <label class="field">
            <span class="icon">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="#222">
                <path d="M17 8h-1V6a4 4 0 10-8 0v2H7a2 2 0 00-2 2v8a2 2 0 002 2h10a2 2 0 002-2v-8a2 2 0 00-2-2zm-6 0V6a3 3 0 116 0v2h-6zm3 10a2 2 0 110-4 2 2 0 010 4z"/>
              </svg>
            </span>
            <input type="password" name="password" placeholder="password" required />
          </label>

          <button type="submit" class="btn-login">LOGIN</button>

          <a class="forgot-link" href="#">Forgot password?</a>

          <p class="signup-hint">
            Don’t have an account?
            <a class="signup-link" href="#">Sign up</a>
          </p>
        </form>
      </div>
    </section>
  </div>
  <!-- Role selection modal -->
<div id="roleModal" class="modal hidden">
  <div class="modal-content" style="animation: slideInDown 0.4s ease-out;">
    <h2 style="animation: fadeIn 0.6s ease-out 0.2s both;">Select Your Role</h2>
    <div class="role-grid">
      <div class="role-card" onclick="window.location.href='signup-customer.html'" style="animation: slideInLeft 0.5s ease-out 0.4s both; transition: transform 0.3s ease;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        <img src="customer.jpg" alt="Customer" />
        <p>CUSTOMER</p>
      </div>
      <div class="role-card" onclick="window.location.href='signup-seller.html'" style="animation: slideInUp 0.5s ease-out 0.5s both; transition: transform 0.3s ease;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        <img src="seller.jpg" alt="Seller" />
        <p>SELLER</p>
      </div>
      <div class="role-card" onclick="window.location.href='signup-ngo.html'" style="animation: slideInRight 0.5s ease-out 0.6s both; transition: transform 0.3s ease;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        <img src="ngo.jpg" alt="NGO'S" />
        <p>NGO'S</p>
      </div>
    </div>
    <button onclick="closeModal()" class="btn-close" style="animation: fadeIn 0.6s ease-out 0.8s both;">Close</button>
  </div>
</div>


  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Login pressed (UI only)');
    });
  </script>
  <script>
  const signupLink = document.querySelector('.signup-link');
  const roleModal = document.getElementById('roleModal');

  signupLink.addEventListener('click', (e) => {
    e.preventDefault();
    roleModal.classList.remove('hidden');
  });

  function closeModal() {
    roleModal.classList.add('hidden');
  }
</script>
<script>
document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  const f = e.target;
  const payload = {
    username: f.username.value.trim(),
    password: f.password.value
  };
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (res.ok && data.ok) {
  if (data.role === 'customer') {
    window.location.href = 'customer-homepage.html';
  } else if (data.role === 'seller') {
    window.location.href = 'seller-homepage.html';
  } else if (data.role === 'ngo') {
    window.location.href = 'ngo-homepage.html';
  } else {
    alert('Unknown role');
  }
}
});
</script>
</body>
</html>
