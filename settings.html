<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NearXpiry Settings</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f6f8;
      color: #333;
      animation: fadeIn 0.8s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideInDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes slideInUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes zoomIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    header {
      background-color: #2e7d32;
      color: white;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: slideInDown 0.6s ease-out;
    }

    header img {
      height: 40px;
    }

    .app-title {
      display: flex;
      align-items: center;
    }

    .app-title h1 {
      margin-left: 10px;
      font-size: 24px;
    }

    .container {
      padding: 40px 20px;
      text-align: center;
    }

    .settings-title {
      font-size: 28px;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      animation: zoomIn 0.8s ease-out 0.2s both;
    }

    .settings-title i {
      font-size: 28px;
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .settings-button {
      background-color: white;
      border: 2px solid #2e7d32;
      color: #2e7d32;
      padding: 15px 25px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 180px;
      animation: slideInUp 0.6s ease-out calc(0.4s + var(--btn-delay, 0s)) both;
    }

    .settings-button:nth-child(1) { --btn-delay: 0.1s; }
    .settings-button:nth-child(2) { --btn-delay: 0.2s; }
    .settings-button:nth-child(3) { --btn-delay: 0.3s; }

    .settings-button:hover {
      background-color: #2e7d32;
      color: white;
      transform: translateY(-3px);
      box-shadow: 0 6px 15px rgba(46, 125, 50, 0.3);
    }
  </style>
  <!-- Font Awesome for gear icon -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

  <header>
    <div class="app-title">
      <img src="nearexpirylogo.png" alt="NearXpiry Logo" />
      <h1>NearXpiry</h1>
    </div>
    <div>Welcome, User</div>
  </header>

  <div class="container">
    <div class="settings-title">
      <i class="fas fa-cog"></i>
      <span>Settings</span>
    </div>

    <div class="button-group">
      <button class="settings-button">Change Password</button>
      <button class="settings-button">Notification Preferences</button>
      <button class="settings-button">Privacy Options</button>
    </div>
  </div>

</body>
</html>
