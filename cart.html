<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Cart | NearXpiry</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      animation: fadeIn 0.8s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideInDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes slideInUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes slideInLeft {
      from { transform: translateX(-50px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .cart-container {
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;
  background: #f8fafc;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,0,0,0.05);
  animation: slideInDown 0.8s ease-out 0.2s both;
}

.cart-container h2 {
  font-size: 24px;
  font-weight: 800;
  color: #2a6e0e;
  margin-bottom: 20px;
  animation: slideInLeft 0.6s ease-out 0.4s both;
}
.cart-item {
  display: flex;
  align-items: center;
  background: #ffffff;
  padding: 16px;
  margin-bottom: 16px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  animation: slideInUp 0.5s ease-out calc(0.6s + var(--item-delay, 0s)) both;
  transition: transform 0.3s ease;
}

.cart-item:hover {
  transform: translateX(5px);
}

.cart-item img {
  border-radius: 8px;
  margin-right: 20px;
}

.cart-item h4 {
  font-size: 18px;
  margin: 0;
  color: #333;
}

.cart-item p {
  margin: 4px 0;
  font-size: 14px;
  color: #555;
}

.cart-item button {
  margin-top: 8px;
  background-color: #c62828;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
}

.cart-item button:hover {
  background-color: #b71c1c;
}

#cart-summary {
  margin-top: 30px;
  text-align: right;
  animation: slideInUp 0.6s ease-out 0.8s both;
}

#cart-summary p {
  font-size: 16px;
  margin: 6px 0;
  font-weight: 600;
}

#cart-summary button {
  background-color: #2a6e0e;
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

#cart-summary button:hover {
  background-color: #1e4d08;
}
.popup-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.popup-box {
  background: #fff;
  padding: 24px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  max-width: 320px;
}

.popup-box h3 {
  font-size: 20px;
  color: #2a6e0e;
  margin-bottom: 12px;
}

.popup-box p {
  font-size: 14px;
  color: #444;
  margin-bottom: 20px;
}

.popup-actions {
  display: flex;
  justify-content: center;
  gap: 12px;
}

#popup-link,
.close-btn {
  background-color: #2a6e0e;
  color: white;
  border: none;
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
}

#popup-link:hover,
.close-btn:hover {
  background-color: #1e4d08;
}
.confirm-btn {
  background-color: #2a6e0e;
  color: white;
  border: none;
  border-radius: 6px;
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 20px;
  transition: background-color 0.2s ease;
}

.confirm-btn:hover {
  background-color: #1e4d08;
}

  </style>
</head>
<body>
    <!-- Reusable Popup for Order Confirmation -->
<div id="popup" class="popup-overlay">
  <div class="popup-box">
    <h3 id="popup-title">✅ Order Placed Successfully!</h3>
    <p id="popup-message">Your order has been confirmed.<br>Thank you for shopping with <strong>NearXpiry</strong>!</p>
    <div class="popup-actions">
      <a id="popup-link" href="customer-homepage.html">Continue Shopping</a>
      <button onclick="closePopup()" class="close-btn">Close</button>
    </div>
  </div>
</div>

  <header>
    <!-- Reuse your existing header here -->
  </header>

  <main class="cart-container">
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <div id="cart-summary">
      <p id="total-items">Total Items: 0</p>
      <p id="total-discount">Total Discount: ₹0</p>
    </div>
    <div class="cart-summary">
  <!-- You can show total price here if needed -->
  <button onclick="confirmOrder()" class="confirm-btn">Confirm Order</button>
</div>

  </main>

  <footer>
    <!-- Reuse your footer -->
  </footer>

  <script>
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const cartItemsDiv = document.getElementById('cart-items');
    let totalDiscount = 0;
    let totalPrice = 0;
    let totalItems = 0;

    if (cart.length === 0) {
      cartItemsDiv.innerHTML = '<p>Your cart is empty.</p>';
    } else {
      cart.forEach(item => {
        const quantity = item.quantity || 1;
        const itemPrice = (item.price || 50) * quantity; // Default price if not available
        const itemDiscount = Math.round((itemPrice * item.discount) / 100);
        
        totalItems += quantity;
        totalPrice += itemPrice;
        totalDiscount += itemDiscount;
        
        const itemDiv = document.createElement('div');
        itemDiv.className = 'cart-item';
        itemDiv.style.setProperty('--item-delay', `${cart.indexOf(item) * 0.1}s`);
        itemDiv.innerHTML = `
          <img src="${item.image}" alt="${item.name}" width="80" />
          <div>
            <h4>${item.name}</h4>
            <p>Quantity: ${quantity}</p>
            <p>Expires in ${item.expiryDays} days</p>
            <p>Price: ₹${itemPrice} (${item.discount}% OFF)</p>
            <button onclick="removeFromCart('${item.name}')">Remove</button>
          </div>
        `;
        cartItemsDiv.appendChild(itemDiv);
      });

      document.getElementById('total-items').textContent = `Total Items: ${totalItems}`;
      document.getElementById('total-discount').textContent = `Total Savings: ₹${totalDiscount}`;
      
      // Add total price display
      const summaryDiv = document.getElementById('cart-summary');
      const existingTotal = summaryDiv.querySelector('#total-price');
      if (!existingTotal) {
        const totalPriceP = document.createElement('p');
        totalPriceP.id = 'total-price';
        totalPriceP.style.fontSize = '18px';
        totalPriceP.style.fontWeight = 'bold';
        totalPriceP.style.color = '#2a6e0e';
        summaryDiv.insertBefore(totalPriceP, summaryDiv.lastElementChild);
      }
      document.getElementById('total-price').textContent = `Total: ₹${totalPrice - totalDiscount}`;
    }

    function removeFromCart(name) {
      const updatedCart = cart.filter(item => item.name !== name);
      localStorage.setItem('cart', JSON.stringify(updatedCart));
      location.reload(); // Refresh to update view
    }

    function checkout() {
      alert('Proceeding to checkout...');
      // Redirect or handle checkout logic here
    }
    function showOrderPopup() {
  document.getElementById('popup').style.display = 'flex';
}

function closePopup() {
  document.getElementById('popup').style.display = 'none';
}
async function confirmOrder() {
  const cart = JSON.parse(localStorage.getItem('cart')) || [];
  
  if (cart.length === 0) {
    alert('Your cart is empty!');
    return;
  }

  try {
    const response = await fetch('/api/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cart, customerId: 'customer1' })
    });
    
    const result = await response.json();
    
    if (result.ok) {
      localStorage.removeItem('cart');
      showOrderPopup();
    } else {
      alert('Order failed: ' + result.message);
    }
  } catch (err) {
    alert('Order failed: ' + err.message);
  }
}


  </script>
</body>
</html>
