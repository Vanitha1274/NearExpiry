<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Seller Settings - NearXpiry</title>
  <link href="https://fonts.googleapis.com/css2?family=Shrikhand&family=Alice&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Alice', serif;
      background-color: #f0fdf4;
      margin: 0;
      padding: 40px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      font-size: 28px;
      font-family: 'Shrikhand', cursive;
      color: #1b5e20;
      margin-bottom: 30px;
    }

    label {
      display: block;
      margin: 20px 0 8px;
      font-weight: bold;
      color: #2a422d;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .btn {
      margin-top: 30px;
      background-color: #2a7a41;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #1b5e20;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚙️ Seller Settings</h1>

    <label for="email">Update Email</label>
    <input type="email" id="email" placeholder="seller123@nearxpiry.com" />

    <label for="store">Store Name</label>
    <input type="text" id="store" placeholder="Green Basket" />

    <label for="location">Change Location</label>
    <input type="text" id="location" placeholder="Aminjikkarai, Chennai" />

    <label for="language">Preferred Language</label>
    <select id="language">
      <option>English</option>
      <option>Tamil</option>
      <option>Hindi</option>
    </select>

    <button class="btn">Save Changes</button>
  </div>
</body>
</html>
