<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NearXpiry Dashboard</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f6f8;
      color: #333;
      animation: fadeIn 0.8s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideInDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes slideInUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    header {
      background-color: #2e7d32;
      color: white;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: slideInDown 0.6s ease-out;
    }
    header img {
      height: 50px;
    }
    .container {
      padding: 20px;
    }
    h1 {
      margin-top: 0;
    }
    .summary {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 30px;
      animation: slideInUp 0.8s ease-out 0.2s both;
    }
    .box {
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      flex: 1;
      min-width: 200px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .box:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    .recent-purchases {
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      animation: slideInUp 0.8s ease-out 0.4s both;
    }
    .purchase-item {
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
      transition: background-color 0.3s ease;
    }

    .purchase-item:hover {
      background-color: #f8f9fa;
      border-radius: 6px;
      padding: 10px;
    }
    .purchase-item:last-child {
      border-bottom: none;
    }
    .label {
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    <div style="display: flex; align-items: center;">
      <img src="nearexpirylogo.png" alt="NearXpiry Logo" />
      <h2 style="margin-left: 15px;">NearXpiry</h2>
    </div>
    <div><center>WELCOME USER!</center></div>
  </header>

  <div class="container">
    <div class="summary">
      <div class="box">
        <div class="label">Total Items Purchased</div>
        <div>3</div>
      </div>
      <div class="box">
        <div class="label">Total Savings</div>
        <div>₹1000</div>
      </div>
      <div class="box">
        <div class="label">Waste Prevented</div>
        <div>3Kg</div>
      </div>
      <div class="box">
        <div class="label">Loyalty Points</div>
        <div>10</div>
      </div>
    </div>

    <div class="recent-purchases">
      <h3>Recent Purchases</h3>
      <div class="purchase-item">
        <div class="label">Sakthi Masala</div>
        <div>Expiry Date: 13-12-25</div>
        <div>Discount: 20%</div>
      </div>
      <div class="purchase-item">
        <div class="label">Dark Fantasy</div>
        <div>Expiry Date: 12-11-25</div>
        <div>Discount: 10%</div>
      </div>
      <div class="purchase-item">
        <div class="label">Naga Maida</div>
        <div>Expiry Date: 31-10-25</div>
        <div>Discount: 30%</div>
      </div>
    </div>
  </div>

</body>
</html>
