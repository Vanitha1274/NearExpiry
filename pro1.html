<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Seller Profile - NearXpiry</title>
  <link href="https://fonts.googleapis.com/css2?family=Shrikhand&family=Alice&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Alice', serif;
      background-color: #f0fdf4;
      padding: 40px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      font-size: 32px;
      font-family: 'Shrikhand', cursive;
      color: #1b5e20;
      margin-bottom: 10px;
    }

    .email {
      display: block;
      margin: 0 auto 30px;
      padding: 8px 20px;
      background: #dcedc8;
      border-radius: 15px;
      font-size: 14px;
      text-align: center;
      width: fit-content;
    }

    .summary {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 40px;
    }

    .card {
      background: #e8f5e9;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      flex: 1;
      min-width: 180px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .section {
      margin-top: 30px;
    }

    .items {
      display: flex;
      gap: 25px;
      flex-wrap: wrap;
    }

    .item-card {
      background: #f1f8e9;
      padding: 20px;
      border-radius: 12px;
      flex: 1;
      min-width: 200px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    h2 {
      font-family: 'Shrikhand', cursive;
      color: #2a422d;
      margin-bottom: 20px;
    }

    p {
      font-size: 16px;
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WELCOME SELLER!</h1>
    <span class="email">seller123@nearxpiry.com</span>

    <div class="summary">
      <div class="card"><h3>Total Items Listed</h3><p>45</p></div>
      <div class="card"><h3>Total Sales</h3><p>₹15,000</p></div>
      <div class="card"><h3>Discounts Given</h3><p>20%</p></div>
      <div class="card"><h3>Waste Prevented</h3><p>50Kg</p></div>
    </div>

    <div class="section">
      <h2>Recently Listed Items</h2>
      <div class="items">
        <div class="item-card"><h3>Aashirvaad Atta</h3><p>Expiry: 20-11-25</p><p>Discount: 15%</p></div>
        <div class="item-card"><h3>Parle-G Biscuits</h3><p>Expiry: 05-12-25</p><p>Discount: 10%</p></div>
        <div class="item-card"><h3>Tata Salt</h3><p>Expiry: 30-10-25</p><p>Discount: 5%</p></div>
      </div>
    </div>
  </div>
</body>
</html>
